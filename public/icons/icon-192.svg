  <circle cx="54.4" cy="72" r="48" fill="none" stroke="#C4A96A" stroke-width="1.0" opacity="0.55"/>
  <circle cx="137.6" cy="120" r="48" fill="none" stroke="#C4A96A" stroke-width="1.0" opacity="0.55"/>
